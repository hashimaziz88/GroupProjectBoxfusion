name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "team-2-group-project/**"
  pull_request:
    branches: ["main"]
    paths:
      - "team-2-group-project/**"

jobs:
  lint-and-build:
    name: Lint & Build (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: team-2-group-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: team-2-group-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
